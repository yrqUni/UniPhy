model:
  in_channels: 30
  out_channels: 30
  embed_dim: 128
  expand: 4
  depth: 8
  patch_size: [7, 15]
  img_height: 721
  img_width: 1440
  dt_ref: 6.0
  init_noise_scale: 0.0001
  ensemble_size: 1

data:
  input_dir: "./data/ERA5"
  year_range: [2000, 2000]
  window_size: 10

alignment:
  pretrained_ckpt: ""
  condition_steps: 4
  max_target_steps: 2
  target_dt: 6.0
  sub_steps: [1, 2, 3, 6]
  max_rollout_steps: 72
  chunk_size: 6

train:
  batch_size: 1
  lr: 5.0e-5
  weight_decay: 0.01
  epochs: 1
  grad_clip: 10.0
  grad_accum_steps: 4
  basis_reg_weight: 0.01

logging:
  log_every: 1
  log_path: "/tmp/uniphy/align_logs"
  ckpt_dir: "/tmp/uniphy/align_ckpt"
  ckpt: ""
