model:
  in_channels: 30
  out_channels: 30
  embed_dim: 128
  expand: 4
  depth: 8
  patch_size: [7, 15]
  img_height: 721
  img_width: 1440
  dt_ref: 6.0
  init_noise_scale: 0.0001
  ensemble_size: 1

data:
  input_dir: "./data/ERA5"
  year_range: [2000, 2000]
  window_size: 10
  sample_k: 5
  look_ahead: 2

train:
  batch_size: 1
  lr: 1.0e-4
  weight_decay: 0.05
  epochs: 1
  grad_clip: 128.0
  grad_accum_steps: 1
  use_scheduler: false
  use_tf32: true
  basis_reg_weight: 0.01

logging:
  log_every: 1
  ckpt_step: 1.0
  log_path: "/tmp/uniphy/logs"
  ckpt_dir: "/tmp/uniphy/ckpt"
  ckpt: ""
